<svg width="1600" height="480" viewBox="0 0 1600 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lattice-gradient" x1="0" y1="0" x2="0" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff5a36" />
      <stop offset="1" stop-color="#a855f7" />
    </linearGradient>
    <linearGradient id="fade-top-to-bottom" x1="0" y1="0" x2="0" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="white" stop-opacity="0" />
      <stop offset="1" stop-color="white" stop-opacity="1" />
    </linearGradient>
    <pattern id="lattice" patternUnits="userSpaceOnUse" width="64" height="64" patternTransform="rotate(90)">
      <path d="M0 64 L64 0" stroke="url(#lattice-gradient)" stroke-width="1.2" />
      <path d="M0 0 L64 64" stroke="url(#lattice-gradient)" stroke-width="1.2" />
      <path d="M32 0 V64" stroke="url(#lattice-gradient)" stroke-width="1.2" />
    </pattern>
    <mask id="mask-fade" maskUnits="userSpaceOnUse" x="0" y="0" width="1600" height="480">
      <rect width="1600" height="480" fill="url(#fade-top-to-bottom)" />
    </mask>
  </defs>
  <rect width="1600" height="480" fill="url(#lattice)" mask="url(#mask-fade)" />
</svg>
